<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辰慕霆</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #1a1a1a;
            color: #ffffff;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部样式 */
        header {
            text-align: center;
            padding: 80px 0;
            background: #2d2d2d;
            margin-bottom: 40px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid #4CAF50;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .social-links {
            margin-top: 20px;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 24px;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #4CAF50;
        }

        /* 主要内容区 */
        .content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .card {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: #3d3d3d;
            padding: 20px;
            border-radius: 8px;
            transition: transform 0.3s;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #45a049;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            
            .projects {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 50px 0;
            }
            
            .avatar {
                width: 120px;
                height: 120px;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <img src="./user.jpg" alt="头像" class="avatar">
            <h1>辰慕霆</h1>
            <p>小白一个 | 随性分享</p>
            <div class="social-links">
                <a href="https://github.com/chenmuting" target="_blank">
                    <i class="fab fa-github"></i>
                </a>
                <!-- 可以添加其他社交链接 -->
            </div>
        </div>
    </header>

    <main class="container">
        <div class="content">
            <section class="card">
                <h2>👋 关于我</h2>
                <p>纯小白一个，不要看我......</p>
            </section>

            <section class="card">
                <h2>⭐ GitHub & APP</h2>
                <div class="projects">
                    <!-- 示例项目卡片 -->
                    <div class="project-card">
                        <h3>小说神器-开源阅读</h3>
                        <p>我最爱的小说软件，永远支持！！！</p>
                        <a href="https://gedoor.github.io/" class="btn" target="_blank">
                            开源阅读 <i class="fas fa-external-link-alt"></i>
                        </a>
                    </div>

                    <div class="project-card">
                        <h3>鸿蒙ClashMeta（小猫咪）</h3>
                        <p>翻墙神器clash鸿蒙版</p>
                        <a href="https://github.com/likuai2010/ClashMeta" class="btn" target="_blank">
                            ClashMeta <i class="fas fa-external-link-alt"></i>
                        </a>
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
